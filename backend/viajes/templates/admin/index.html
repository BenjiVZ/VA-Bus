{% extends "admin/index.html" %}

{% block content %}
<div style="
  background: linear-gradient(135deg, #1a3a6b 0%, #2d5aa0 100%);
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 15px rgba(26, 58, 107, 0.3);
">
  <div>
    <h2 style="color: #f5c842; margin: 0 0 0.3rem; font-size: 1.1rem;">&#128652; Portal de Viajes</h2>
    <p style="color: rgba(255,255,255,0.85); margin: 0; font-size: 0.85rem;">
      Crea viajes individuales o en lote de forma rápida y cómoda
    </p>
  </div>
  <a href="/admin/portal-viajes/" style="
    background: #f5c842;
    color: #1a3a6b;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  " onmouseover="this.style.background='#ffd700'; this.style.transform='translateY(-2px)'" onmouseout="this.style.background='#f5c842'; this.style.transform='none'">
    &#10133; Abrir Portal
  </a>
</div>

{{ block.super }}
{% endblock %}
