<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aerorutas de Venezuela — App de reservas de pasajes">
  <meta name="theme-color" content="#1a3a6b">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Aerorutas">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Google Sign-In: Web Client ID (público) — el mismo que usa el frontend
       React y con el que valida el backend Django. -->
  <meta name="google-signin-client_id" content="941001553573-u64s6mjms1jtlk0v5agsrk5qq6bbvoat.apps.googleusercontent.com">

  <title>Aerorutas de Venezuela</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #f5f6f8; }
    #loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1a3a6b; gap: 12px;
    }
    #loader .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e8edf5;
      border-top-color: #1a3a6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <div>Cargando Aerorutas…</div>
  </div>
  <script>
    // Oculta el loader cuando Flutter termina de bootstrappear.
    window.addEventListener('flutter-first-frame', () => {
      const l = document.getElementById('loader');
      if (l) l.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
