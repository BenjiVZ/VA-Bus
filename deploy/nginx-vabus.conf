# /etc/nginx/sites-available/vabus
# Escucha en localhost; Cloudflare Tunnel le manda el tráfico del dominio.
# (No hace falta listen 443 ni certificados: el HTTPS lo pone Cloudflare.)

# ── Frontend web público + API + WebSockets (mismo dominio) ──
server {
    listen 80;
    server_name aerorutasdevenezuela.net;

    client_max_body_size 6M;   # subida de comprobantes/documentos (límite 5MB en Django)

    # API REST
    location /api/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Panel admin de Django
    location /admin/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # WebSockets (mapa de asientos en tiempo real)
    location /ws/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
    }

    # Archivos estáticos y subidas (servidos directo por nginx)
    location /static/ { alias /opt/va-bus/backend/staticfiles/; }
    location /media/  { alias /opt/va-bus/backend/media/; }

    # Frontend React (SPA): todo lo demás cae en index.html
    root /opt/va-bus/frontend/dist;
    index index.html;
    location / { try_files $uri /index.html; }
}

# ── (OPCIONAL) App web (Flutter) en su subdominio ──
# Compilá con: flutter build web --dart-define=API_BASE_URL=https://aerorutasdevenezuela.net/api
# y subí mobile/build/web al server. Luego agregá el hostname en Cloudflare Tunnel.
server {
    listen 80;
    server_name app.aerorutasdevenezuela.net;

    root /opt/va-bus/mobile/build/web;
    index index.html;
    location / { try_files $uri /index.html; }
}
